<!DOCTYPE html>
<html lang="en">

<head>
    <!-- Character Encoding -->
    <meta charset="UTF-8">

    <!-- Makes the website responsive on all devices -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <!-- Title displayed on the browser tab -->
    <title>TaskNest | Smart To-Do Manager</title>

    <!-- Linking the CSS file -->
    <link rel="stylesheet" href="css/style.css">
</head>

<body>

    <!-- ================= HEADER START ================= -->

    <header class="header">

        <!-- Logo and Title Section -->
        <div class="logo-section">

            <h1 id="app-title">
                TaskNest
            </h1>

            <p class="subtitle">
                Stay organized and manage your daily tasks efficiently.
            </p>

        </div>

        <!-- Dark Mode Button -->
        <button id="theme-toggle" type="button">
            🌙 Dark Mode
        </button>

    </header>

    <!-- ================= HEADER END ================= --><main>

    <!-- ================= Dashboard ================= -->

    <section class="dashboard">

        <div class="dashboard-card">

            <h3>Total Tasks</h3>

            <p id="total-tasks">0</p>

        </div>

        <div class="dashboard-card">

            <h3>Pending</h3>

            <p id="pending-tasks">0</p>

        </div>

        <div class="dashboard-card">

            <h3>Completed</h3>

            <p id="completed-tasks">0</p>

        </div>

        <div class="dashboard-card">

            <h3>Progress</h3>

            <p id="progress">0%</p>

        </div>

    </section>

</main>


</body>

</html>
